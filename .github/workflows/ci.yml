name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20.x', '22.x']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run check:embedded-drift
      - run: npm run check:docs-drift
      - run: npm audit --audit-level=high

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: contentkit-test
          POSTGRES_DB: contentkit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d contentkit"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CONTENTKIT_TEST_DATABASE_URL: postgresql://postgres:contentkit-test@127.0.0.1:5432/contentkit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  binary-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm
      - uses: oven-sh/setup-bun@v2
      - run: npm ci
      - run: npm run test:e2e:local
