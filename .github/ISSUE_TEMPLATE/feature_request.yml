name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the use case, not only the solution you have in mind.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How could this work? API sketch, example config, etc.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
